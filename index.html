<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Little World</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;500;700&display=swap');

body {
    margin: 0;
    font-family: 'Quicksand', sans-serif;
    background: url('background.jpg') center/cover no-repeat;
    color: white;
}

/* ===== LOGIN SCREEN ===== */
#loginPage {
    position: fixed;
    width: 100%;
    height: 100%;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
}

.loginBox {
    background: rgba(255,255,255,0.15);
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    width: 300px;
}

input {
    width: 90%;
    padding: 10px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: pink;
    cursor: pointer;
}

/* ===== MAIN PAGE ===== */
#mainContent {
    display: none;
    padding: 20px;
}

.sidebar {
    width: 200px;
    background: rgba(0,0,0,0.4);
    padding: 15px;
    border-radius: 15px;
    float: left;
}

.card {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 15px;
    margin: 10px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-left: 220px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginPage">
    <div class="loginBox">
        <h2>🔒 Enter Password</h2>
        <input type="password" id="pass" placeholder="Password">
        <button onclick="checkPass()">Enter 💗</button>
    </div>
</div>

<!-- MAIN SITE -->
<div id="mainContent">

    <div class="sidebar">
        <h3>Our Little World 💗</h3>
        <p>Home</p>
        <p>Photos</p>
        <p>Videos</p>
        <p>Messages</p>
        <p>Memories</p>
    </div>

    <div class="grid">

        <div class="card">🌸 Welcome to your space</div>
        <div class="card">💗 Recent Memory</div>
        <div class="card">🎵 Music</div>

        <div class="card">📸 Photo section</div>
        <div class="card">🎥 Video section</div>
        <div class="card">📅 Calendar</div>

    </div>

</div>

<script>
function checkPass(){
    let password = document.getElementById("pass").value;

    // 🔑 پسورد رو اینجا تغییر بده
    if(password === "1234"){
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
    } else {
        alert("Wrong password 💔");
    }
}
</script>

</body>
  </html>
