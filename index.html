<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Memories</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0b1b2b,#1b3b5c);
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.card{
background:rgba(255,255,255,0.08);
border-radius:15px;
overflow:hidden;
padding:10px;
backdrop-filter:blur(10px);
}

.card img, .card video{
width:100%;
border-radius:10px;
}

.note{
margin-top:20px;
padding:15px;
background:rgba(255,255,255,0.08);
border-radius:15px;
}
</style>

</head>

<body>

<h1>💖 Our Memory Collection</h1>

<div class="gallery">

<div class="card">
<img src="https://picsum.photos/300/200?1">
<p>📷 Memory 1</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<p>📷 Memory 2</p>
</div>

<div class="card">
<video controls src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
<p>🎥 Video Memory</p>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<p>📷 Memory 3</p>
</div>

</div>

<div class="note">
💌 This is our private collection of memories.  
You can replace these with your real photos and videos ❤️
</div>

</body>
</html>
