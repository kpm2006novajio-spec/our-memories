<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Our Memories</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#071a2f,#123a5a);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.card{
background:rgba(255,255,255,0.08);
padding:20px;
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
width:320px;
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

input,button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
font-size:14px;
}

button{
background:#4da3ff;
color:white;
cursor:pointer;
}

button:hover{
background:#2f8cff;
}

#main{display:none;flex-direction:column;gap:10px;}

#content{
margin-top:10px;
background:rgba(0,0,0,0.2);
padding:10px;
border-radius:10px;
min-height:120px;
font-size:14px;
}

img,video{
width:100%;
border-radius:10px;
margin-top:5px;
}
</style>

</head>

<body>

<!-- LOGIN -->
<div id="login" class="card">
<h2>Our Memories ❤️</h2>
<input id="user" placeholder="username">
<input type="password" id="pass" placeholder="password">
<button onclick="login()">Enter</button>
</div>

<!-- MAIN -->
<div id="main" class="card">

<h3>Welcome ✨</h3>

<button onclick="openSection('memories')">📷 Memories</button>
<button onclick="openSection('videos')">🎥 Videos</button>
<button onclick="openSection('music')">🎵 Music</button>
<button onclick="openSection('letters')">💌 Letters</button>

<div id="content">Select a section</div>

</div>

<script>

function login(){
let u = document.getElementById("user").value;
let p = document.getElementById("pass").value;

if((u==="me" && p==="pishi") || (u==="friend" && p==="1234")){
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="flex";
}else{
alert("Wrong login");
}
}

function openSection(name){
let c = document.getElementById("content");

if(name==="memories"){
c.innerHTML=`
<h4>📷 Memories</h4>
<img src="https://picsum.photos/300/200">
`;
}

if(name==="videos"){
c.innerHTML=`
<h4>🎥 Video</h4>
<iframe width="100%" height="180"
src="https://www.youtube.com/embed/dQw4w9WgXcQ"
frameborder="0"></iframe>
`;
}

if(name==="music"){
c.innerHTML=`
<h4>🎵 Music</h4>
<audio controls>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>
`;
}

if(name==="letters"){
c.innerHTML=`
<h4>💌 Letters</h4>
<p>This is our private space to write messages ❤️</p>
<textarea style="width:100%;height:80px;border-radius:10px;"></textarea>
`;
}

}

</script>

</body>
  </html>
